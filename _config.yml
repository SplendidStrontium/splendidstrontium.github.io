# Site settings
title: Not a Number
email: nan@nan.nyc 
description: > # this means to ignore newlines until "baseurl:"
  here, we are not only numbers
baseurl: "" 
url: "https://nan.nyc" 

# Collections
collections:
  wiki:
    output: true
 
defaults:
  - scope:
      path: ""
      type: "wiki"
    values:
      layout: "wiki-entry"
      permalink: /tce/wiki/:path/

# Build settings
markdown: kramdown
permalink: /:categories/:title
theme: minima
plugins:
  - jekyll-feed

#other options
timezone: America/New_York
exclude:	[old, notes, _scripts, _drafts]
