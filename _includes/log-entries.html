{% assign entries = include.entries | default: site.data.log %}
<ul class="log">
  {% for entry in entries %}
  <li class="log-entry">
    <span class="log-date">{{ entry.date | date: "%b %-d" }}</span>
    <span class="log-text">{{ entry.text }}</span>
    {% if entry.mood %}
    <span class="log-mood">feeling: {{ entry.mood }}{% if entry.icon %}
      <img class="mood-icon" src="/assets/moods/{{ entry.icon }}" alt="">{% endif %}</span>
    {% endif %}
  </li>
  {% endfor %}
</ul>
